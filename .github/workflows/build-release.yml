name: Build & Release (Native Tauri)

on:
  push:
    branches: [claude/build-trawl-scraper-D4fCn]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium
          npm install

      - name: Generate release version
        id: version
        run: |
          VERSION=$(date '+%d.%m.%Y-%H%M')
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          npm version --no-git-tag-v "$VERSION"

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Rust binaries for both architectures
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml --target x86_64-apple-darwin
          cargo build --release --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin

          # Binaries land in workspace root target/ because of root Cargo.toml workspace
          lipo -create \
            target/x86_64-apple-darwin/release/trawl \
            target/aarch64-apple-darwin/release/trawl \
            -output target/release/trawl-universal

          file target/release/trawl-universal

      - name: Bundle app
        run: |
          # Build the app bundle using tauri bundler
          npm run tauri-build

      - name: Replace binary with universal binary
        run: |
          # Find the bundled binary and replace it with our universal one
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | grep -v node_modules | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            BINARY_PATH="$APP_PATH/Contents/MacOS/trawl"
            if [ -f "$BINARY_PATH" ]; then
              cp src-tauri/target/release/trawl-universal "$BINARY_PATH"
              echo "Replaced binary with universal version"
            fi
          fi

      - name: Package app as ZIP
        id: artifacts
        run: |
          # Workspace root Cargo.toml redirects target to project root, not src-tauri/target
          APP_PATH=$(find target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1)
          # Fallback: check src-tauri/target as well
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app bundle not found. Searching all bundle dirs:"
            find . -type d -name bundle 2>/dev/null | head -20
            exit 1
          fi
          echo "Found: $APP_PATH"
          VERSION="${{ steps.version.outputs.tag }}"
          ZIP_FILE="Trawl-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_FILE"
          echo "zip=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "ZIP: $ZIP_FILE"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trawl ${{ steps.version.outputs.tag }}
          body: |
            # Trawl ${{ steps.version.outputs.tag }}

            A native macOS web scraper built with Tauri.

            **Universal Binary**: Works on both Intel (x86_64) and Apple Silicon (M1/M2/M3/etc)

            ## Features
            - True native app (~5 MB, not Electron wrapper)
            - Real-world JavaScript rendering
            - Infinite scroll detection
            - Smart link extraction
            - CSV and JSON export
            - Beautiful React UI with Vite

            ## Installation

            1. Download the ZIP file below
            2. Extract it (double-click)
            3. Move Trawl.app to Applications
            4. Launch from Applications

            ## What's New
            - Completely rewritten with Tauri (native framework)
            - New modern React UI with Vite
            - Beautiful dark theme
            - 40x smaller bundle size
            - **Universal binary for Intel and Apple Silicon**

            See GitHub commits for technical changes in this release.
          files: |
            ${{ steps.artifacts.outputs.zip }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
