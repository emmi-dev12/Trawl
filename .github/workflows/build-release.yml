name: Build & Release (Native Tauri)

on:
  push:
    branches: [claude/build-trawl-scraper-D4fCn]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium
          npm install

      - name: Generate release version
        id: version
        run: |
          VERSION=$(date '+%d.%m.%Y-%H%M')
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          npm version --no-git-tag-v "$VERSION"

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build native app (Tauri)
        run: npm run tauri-build

      - name: Find artifacts
        id: artifacts
        run: |
          DMG_FILE=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "Error: DMG not found"
            exit 1
          fi
          echo "dmg=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "DMG: $DMG_FILE"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trawl ${{ steps.version.outputs.tag }}
          body: |
            # Trawl ${{ steps.version.outputs.tag }}

            A native macOS web scraper built with Tauri.

            ## Features
            - True native app (~5 MB, not Electron wrapper)
            - Real-world JavaScript rendering
            - Infinite scroll detection
            - Smart link extraction
            - CSV and JSON export
            - Auto-update support
            - Beautiful React UI with Vite

            ## Installation

            1. Download the DMG file below
            2. Mount it (double-click)
            3. Drag Trawl to Applications
            4. Launch from Applications

            The app will automatically check for updates.

            ## What's New
            - Completely rewritten with Tauri (native framework)
            - New modern React UI with Vite
            - Beautiful dark theme
            - Native menubar integration
            - 40x smaller bundle size

            See GitHub commits for technical changes in this release.
          files: |
            ${{ steps.artifacts.outputs.dmg }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
