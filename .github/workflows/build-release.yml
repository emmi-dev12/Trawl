name: Build & Release

on:
  push:
    branches: [claude/build-trawl-scraper-D4fCn]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          playwright install chromium
          npm install

      - name: Generate release version
        id: version
        run: |
          VERSION=$(date '+%d.%m.%Y-%H%M')
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          npm version --no-git-tag-v "$VERSION"

      - name: Build universal macOS app
        run: npm run build

      - name: Find artifacts
        id: artifacts
        run: |
          DMG_FILE=$(find dist -name "*.dmg" -type f | head -1)
          ZIP_FILE=$(find dist -name "*.zip" -type f | head -1)
          echo "dmg=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "zip=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trawl ${{ steps.version.outputs.tag }}
          body: |
            # Trawl ${{ steps.version.outputs.tag }}

            A fast, no-AI web scraper for macOS.

            ## Features
            - Real-world JavaScript rendering
            - Infinite scroll detection
            - Smart link extraction
            - CSV and JSON export
            - Auto-update support

            ## Installation

            1. Download the DMG file below
            2. Mount it (double-click)
            3. Drag Trawl to Applications
            4. Launch from Applications

            The app will automatically check for updates.

            ## What's New
            - See GitHub commits for changes in this release
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.zip }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
