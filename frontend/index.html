<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trawl - Web Scraper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Menubar Simulation -->
    <div class="app-menubar">
      <div class="menu-left">
        <span class="app-title">Trawl</span>
      </div>
      <div class="menu-right">
        <button id="checkUpdateBtn" class="menu-btn" title="Check for updates">
          <span class="version-badge" id="versionText">v1.0.0</span>
        </button>
      </div>
    </div>

    <!-- Update Notification -->
    <div id="updateNotification" class="update-notification" style="display: none;">
      <div class="update-content">
        <span id="updateMessage" class="update-message">Update available</span>
        <div class="update-buttons">
          <button id="downloadUpdateBtn" class="update-btn update-btn-primary">Download</button>
          <button id="dismissUpdateBtn" class="update-btn update-btn-secondary">Dismiss</button>
        </div>
      </div>
    </div>

    <header class="header">
      <div class="header-content">
        <div>
          <h1>Trawl</h1>
          <p class="subtitle">Fast web scraper for macOS</p>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- URL Input Section -->
      <section class="input-section">
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            class="url-input"
            placeholder="Enter URL (e.g., https://example.com)"
            value="https://example.com"
          />
          <button id="scrapeBtn" class="scrape-btn">Scrape</button>
        </div>
      </section>

      <!-- Options Section -->
      <section class="options-section">
        <div class="options-grid">
          <div class="option-group">
            <label class="radio-group">
              <input type="radio" name="mode" value="single" checked />
              <span>Single Page</span>
            </label>
            <label class="radio-group">
              <input type="radio" name="mode" value="crawl" />
              <span>Crawl (follow links)</span>
            </label>
          </div>

          <div class="option-group">
            <label class="labeled-input">
              Depth:
              <input
                type="number"
                id="depthInput"
                class="number-input"
                value="2"
                min="1"
                max="10"
              />
            </label>
            <label class="labeled-input">
              Max Pages:
              <input
                type="number"
                id="maxPagesInput"
                class="number-input"
                value="50"
                min="1"
                max="500"
              />
            </label>
          </div>

          <div class="option-group">
            <label class="checkbox-group">
              <input type="checkbox" id="scrollInput" checked />
              <span>Handle infinite scroll</span>
            </label>
          </div>

          <div class="option-group">
            <label class="checkbox-group">
              <input type="checkbox" id="extractLinksInput" checked />
              <span>Extract Links</span>
            </label>
            <label class="checkbox-group">
              <input type="checkbox" id="extractTextInput" checked />
              <span>Extract Text</span>
            </label>
            <label class="checkbox-group">
              <input type="checkbox" id="extractStructuredInput" checked />
              <span>Extract Structured</span>
            </label>
          </div>
        </div>
      </section>

      <!-- Results Section -->
      <section class="results-section">
        <h2>Results</h2>

        <!-- Status Bar -->
        <div class="status-bar">
          <span id="statusText" class="status-text">Ready to scrape</span>
          <div id="progressBar" class="progress-bar" style="display: none;">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table id="resultsTable" class="results-table">
            <thead>
              <tr>
                <th class="col-url">URL</th>
                <th class="col-title">Title</th>
                <th class="col-links">Links</th>
                <th class="col-text">Text Preview</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr class="empty-row">
                <td colspan="4">No results yet. Start scraping to see data.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Export Section -->
        <div class="export-section" id="exportSection" style="display: none;">
          <button id="exportCsvBtn" class="export-btn">Export CSV</button>
          <button id="exportJsonBtn" class="export-btn">Export JSON</button>
          <button id="copyBtn" class="export-btn">Copy JSON</button>
        </div>
      </section>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
