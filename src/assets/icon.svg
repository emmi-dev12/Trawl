<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1220;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CC9F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4CC9F0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main background -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="120"/>

  <!-- Glow effect -->
  <circle cx="256" cy="256" r="220" fill="url(#glowGrad)"/>

  <!-- T shape - main upright -->
  <rect x="200" y="80" width="112" height="36" rx="18" fill="url(#primaryGrad)"/>

  <!-- T shape - vertical stem -->
  <rect x="224" y="100" width="64" height="240" rx="32" fill="url(#primaryGrad)"/>

  <!-- Net curve - main arc -->
  <path
    d="M 140 340 Q 256 420 372 340"
    stroke="url(#primaryGrad)"
    stroke-width="32"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Connection points from T to net -->
  <circle cx="256" cy="340" r="20" fill="url(#primaryGrad)" opacity="0.9"/>

  <!-- Net nodes (data points) -->
  <g opacity="0.85">
    <circle cx="180" cy="370" r="18" fill="url(#primaryGrad)"/>
    <circle cx="256" cy="395" r="18" fill="url(#primaryGrad)"/>
    <circle cx="332" cy="370" r="18" fill="url(#primaryGrad)"/>
  </g>

  <!-- Secondary nodes (caught data) -->
  <g opacity="0.6">
    <circle cx="220" cy="385" r="12" fill="#4CC9F0"/>
    <circle cx="292" cy="385" r="12" fill="#4CC9F0"/>
  </g>

  <!-- Connection lines (subtle net structure) -->
  <line x1="256" y1="340" x2="180" y2="370" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="340" x2="332" y2="370" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
</svg>
