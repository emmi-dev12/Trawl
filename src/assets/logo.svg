<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="none"/>

  <!-- Vertical stroke (T upright) -->
  <line x1="32" y1="8" x2="32" y2="40" stroke="#4CC9F0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal stroke (T top) -->
  <line x1="16" y1="8" x2="48" y2="8" stroke="#4CC9F0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Net curve (bottom half - catches data) -->
  <path d="M 16 40 Q 32 56 48 40" stroke="#4CC9F0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Data points caught in net (5 dots) -->
  <circle cx="22" cy="48" r="1.5" fill="#4CC9F0"/>
  <circle cx="32" cy="52" r="1.5" fill="#4CC9F0"/>
  <circle cx="42" cy="48" r="1.5" fill="#4CC9F0"/>
  <circle cx="28" cy="50" r="1.2" fill="#4CC9F0" opacity="0.7"/>
  <circle cx="38" cy="50" r="1.2" fill="#4CC9F0" opacity="0.7"/>
</svg>
